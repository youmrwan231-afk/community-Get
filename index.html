<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offre Abonnés Algérie</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  text-align:center;
}

/* Header */
.header{
  background:#007a3d;
  color:#fff;
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

/* Container */
.container{
  max-width:420px;
  margin:20px auto;
  padding:20px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 0 10px #00000020;
}

h1{
  font-size:20px;
  color:#007a3d;
}

p{
  color:#555;
  font-size:14px;
}

/* Button */
.btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#007a3d;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

/* Wheel */
.wheel-container{
  position:relative;
  width:260px;
  height:260px;
  margin:20px auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  color:#007a3d;
}

canvas{
  border-radius:50%;
  border:5px solid #007a3d;
  transition:3s ease;
}

/* Result */
#result{
  display:none;
}

.badge{
  background:#e6f4ea;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  color:#007a3d;
  font-weight:bold;
}

.fake{
  font-size:12px;
  color:#888;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
📶 Offre spéciale abonnés Algérie 🇩🇿
</div>

<div class="container">

<h1>Bonus Internet & Crédit</h1>
<p>Une offre exclusive pour les utilisateurs Mobilis, Djezzy et Ooredoo</p>

<div id="spinSection">

<div class="wheel-container">
  <div class="pointer">▼</div>
  <canvas id="wheelCanvas" width="260" height="260"></canvas>
</div>

<button class="btn" onclick="spin()">Vérifier mon bonus</button>

<div class="fake">
✔ Offre valable aujourd’hui uniquement<br>
✔ 97 utilisateurs ont déjà reçu un bonus
</div>

</div>

<div id="result">
  <h1>🎉 Félicitations</h1>
  <div class="badge">
    Vous avez reçu : 3000 DA Flexy + 1GB Internet
  </div>
  <button class="btn" onclick="go()">Activer maintenant</button>
</div>

</div>

<script>

const CPA_LINK = "PUT_YOUR_LINK_HERE";

/* Rewards */
const rewards = ["0","500 DA","1GB","1000 DA","Bonus","3000 DA"];
const colors = ["#ff4d4d","#00c851","#ffbb33","#33b5e5","#aa66cc","#2ecc71"];

const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

const slices = rewards.length;
const angle = 2 * Math.PI / slices;

function drawWheel(){
  for(let i=0;i<slices;i++){
    ctx.beginPath();
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*angle,(i+1)*angle);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*angle + angle/2);
    ctx.fillStyle="#000";
    ctx.font="bold 13px Arial";
    ctx.fillText(rewards[i],50,5);
    ctx.restore();
  }
}

drawWheel();

/* Spin */
let spun=false;

function spin(){
  if(spun) return;
  spun=true;

  let wheel = document.getElementById("wheelCanvas");

  let targetIndex = 5;
  let deg = 3600 + (targetIndex * (360 / slices));

  wheel.style.transform="rotate("+deg+"deg)";

  setTimeout(()=>{
    document.getElementById("spinSection").style.display="none";
    document.getElementById("result").style.display="block";
  },3000);
}

/* Redirect */
function go(){
  window.location.href = CPA_LINK;
}
</script>

</body>
</html>
